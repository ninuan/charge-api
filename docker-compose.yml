services:
  web:
    build: .
    volumes:
  - ./data:/app/data
      - ./logs:/app/logs
    environment:
  - SECRET_KEY=${SECRET_KEY} # 从 .env 文件或命令行读取
  - DB_PATH=/app/data/charge_status.db
    expose:
      - "5000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web